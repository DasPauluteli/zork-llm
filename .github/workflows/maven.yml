name: Build Portable Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: maven

    - name: Build Fat-JAR with Maven
      run: mvn -B package --file pom.xml

    - name: Create Portable App Image (jpackage)
      shell: pwsh
      run: |
        $JAR_NAME = "zork-llm-1.0-SNAPSHOT-jar-with-dependencies.jar"
        
        jpackage `
          --type app-image `
          --dest dist `
          --name "ZorkLLM" `
          --input target/ `
          --main-jar $JAR_NAME `
          --main-class de.zork.Main `
          --vendor "DasPauluteli" `
          --copyright "Copyright 2026 DasPauluteli" `
          --description "Abenteuer im Zork-Stil mit Swing-GUI"

    - name: Zip for Distribution
      shell: pwsh
      run: Compress-Archive -Path dist/ZorkLLM -DestinationPath ZorkLLM_Portable_Windows.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zork-LLM-Windows-Portable
        path: ZorkLLM_Portable_Windows.zip